name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Check Disk Space
        run: df -h
        
      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y make patch curl git llvm lld build-essential \
            libncurses-dev libssl-dev bc flex bison rsync kmod cpio python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu ccache
          mkdir -p $HOME/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > $HOME/bin/repo
          chmod a+x $HOME/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

          git config --global user.name "runner"
          git config --global user.email "runner@kernel.local"
          git config --global color.ui false
          git config --global --add safe.directory '*'
          
      - name: Run Build Script
        run: |
          wget https://raw.githubusercontent.com/xxblebleblexx/kernel_builder_action/refs/heads/$GITHUB_REF_NAME/kernel.sh
          chmod +x kernel.sh
          sh kernel.sh

      - name: Prepare image.gz
        run: |
          mkdir -p dir_image_gz
          find . -type f \( -name "image.gz" -o -name "Image.gz" \) -exec cp {} dir_image_gz/ \;
      
      - name: Upload image.gz
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: dir_image_gz/

      - name: Prepare Image
        run: |
          mkdir -p dir_image
          find . -type f -name "Image" -exec cp {} dir_image/ \;
      
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: dir_image/
