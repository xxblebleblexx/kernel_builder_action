name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies and setup clang
        run: |
         sudo apt update -y; sudo apt install -y make patch curl git llvm lld build-essential libncurses-dev libssl-dev bc flex bison rsync kmod cpio python3 gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu patch ccache && wget https://github.com/greenforce-project/greenforce_clang/releases/download/20260523/gf-clang-23.0.0-20260523.tar.gz && mkdir -p clang && mv gf-clang-23.0.0-20260523.tar.gz clang/clang.tar.gz && cd clang && tar -xvzf clang.tar.gz && export PATH="/home/runner/work/kernel_builder_action/kernel_builder_action/clang/bin:$PATH" && clang --version
         
      - name: Add Swap
        uses: actionhippie/swap-space@v1
        with:
          size: 4G
        
      - name: Run Build Script
        run: wget https://raw.githubusercontent.com/xxblebleblexx/kernel_builder_action/refs/heads/main/kernel.sh; chmod +x kernel.sh; sh kernel.sh

      - name: Upload image.gz
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: |
            **/image.gz
            **/Image.gz

      - name: Upload image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: image-gz-dtb
          path: |
            **/image.gz-dtb
            **/Image.gz-dtb

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: |
            **/Image
