name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Check Disk Space
        run: df -h
        
      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y make patch curl git llvm lld build-essential \
            libncurses-dev libssl-dev bc flex bison rsync kmod cpio python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu ccache pip

      - name: Setup Clang
        run: |
          git clone -b clang-12 --depth=1 https://github.com/xxblebleblexx/zyc-clang.git clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Verify Clang Version
        run: clang --version
        
      - name: Run Build Script
        run: |
          wget https://raw.githubusercontent.com/xxblebleblexx/kernel_builder_action/refs/heads/$GITHUB_REF_NAME/kernel.sh
          chmod +x kernel.sh
          sh kernel.sh

      - name: Prepare image.gz
        run: |
          mkdir -p dir_image_gz
          find . -type f \( -name "image.gz" -o -name "Image.gz" \) -exec cp {} dir_image_gz/ \;
      
      - name: Upload image.gz
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: dir_image_gz/

      - name: Prepare image.gz-dtb
        run: |
          mkdir -p dir_dtb
          find . -type f \( -name "image.gz-dtb" -o -name "Image.gz-dtb" \) -exec cp {} dir_dtb/ \;
      
      - name: Upload image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: image-gz-dtb
          path: dir_dtb/

      - name: Prepare Image
        run: |
          mkdir -p dir_image
          find . -type f -name "Image" -exec cp {} dir_image/ \;
      
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: dir_image/
