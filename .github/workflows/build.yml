name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Maximize Build Space & Free Disk Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 10244
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Check Disk Space
        run: df -h
        
      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y make patch curl git llvm lld build-essential \
            libncurses-dev libssl-dev bc flex bison rsync kmod cpio python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu ccache

      - name: Setup Greenforce Clang
        run: |
          wget https://github.com/greenforce-project/greenforce_clang/releases/download/20260523/gf-clang-23.0.0-20260523.tar.gz
          mkdir -p $GITHUB_WORKSPACE/clang
          tar -xzf gf-clang-23.0.0-20260523.tar.gz -C $GITHUB_WORKSPACE/clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Verify Clang Version
        run: clang --version
        
      - name: Run Build Script
        run: |
          wget https://raw.githubusercontent.com/xxblebleblexx/kernel_builder_action/refs/heads/main/kernel.sh
          chmod +x kernel.sh
          sh kernel.sh

      - name: Upload image.gz
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: |
            **/image.gz
            **/Image.gz

      - name: Upload image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: image-gz-dtb
          path: |
            **/image.gz-dtb
            **/Image.gz-dtb

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: |
            **/Image
